services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gra}
      POSTGRES_DB: gra
    ports:
      - "5434:5432" # 로컬 DB GUI/개발 접속용 (호스트 5434 → 컨테이너 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gra"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://gra:${POSTGRES_PASSWORD:-gra}@db:5432/gra
      CLIENT_DIR: /client
      PORT: 3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      JWT_SECRET: ${JWT_SECRET:-gra-dev-secret-change-me}
      SEED_FORCE: ${SEED_FORCE:-1} # 재기동 시 시드 데이터 강제 복원(시연용)
    ports:
      - "3001:3000"
    volumes:
      - ./client:/client # 프론트엔드 수정 시 재빌드 불필요
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
